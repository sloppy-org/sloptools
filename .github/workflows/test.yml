name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.24.x
          cache: true

      - name: install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: gofmt
        run: |
          offenders="$(gofmt -s -l .)"
          if [ -n "$offenders" ]; then
            echo "gofmt -s found unformatted files:"
            echo "$offenders"
          fi
          test -z "$offenders"

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -race
